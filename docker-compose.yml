services:
  backend:
    build: ./backend
    ports:
      - "3001:3001"
    env_file:
      - ./backend/.env
    environment:
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=dev_secret
    depends_on:
      - redis
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped   # auto-restarts on crash / server reboot

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped